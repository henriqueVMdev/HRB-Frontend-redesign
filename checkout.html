<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Finalizar compra - HRB Imports Auto Parts." />
    <title>Finalizar Compra — HRB Imports Auto Parts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-manager">
      <a class="brand" href="index.html" aria-label="HRB Imports">
        <img src="assets/figma/header-logo.svg" alt="HRB Imports" />
      </a>
      <div class="top-actions">
        <button class="top-action" type="button" id="cartButton">
          <span>Meu Carrinho&nbsp;|&nbsp;<strong id="cartTotal">R$ 0,00</strong></span>
          <img src="assets/figma/header-cart-icon.svg" alt="" aria-hidden="true" />
        </button>
        <button class="top-action" type="button" id="loginButton">
          <span>Minha Conta</span>
          <img src="assets/figma/header-user-icon.svg" alt="" aria-hidden="true" />
        </button>
      </div>
    </header>

    <main class="checkout-page">
      <section class="checkout-panel reveal is-visible">
        <div class="section-title">
          <div class="title-row">
            <img src="assets/figma/title-triangle-yellow.svg" alt="" aria-hidden="true" />
            <h1>Meu carrinho</h1>
          </div>
          <img class="title-line" src="assets/figma/title-line-yellow.svg" alt="" aria-hidden="true" />
        </div>

        <div class="checkout-cart">
          <div class="checkout-rail" id="checkoutRail"></div>
          <p class="checkout-total" id="checkoutTotal">Total : R$ 0,00</p>
        </div>

        <form class="checkout-form" id="checkoutForm">
          <div class="form-row">
            <label class="input-field boxed plain">
              <span>Primeiro Nome</span>
              <input type="text" name="firstName" placeholder="Example" required />
            </label>
            <label class="input-field boxed plain">
              <span>Sobrenome</span>
              <input type="text" name="lastName" placeholder="Example" required />
            </label>
          </div>
          <div class="form-row half">
            <label class="input-field boxed plain">
              <span>CPF/CNPJ</span>
              <input type="text" name="document" placeholder="Example" required />
            </label>
          </div>
          <label class="input-field boxed plain">
            <span>Email</span>
            <input type="email" name="email" placeholder="example@gmail.com" required />
          </label>
          <div class="form-row">
            <label class="input-field boxed plain">
              <span>Estado</span>
              <input type="text" name="state" placeholder="Example" required />
            </label>
            <label class="input-field boxed plain">
              <span>Cidade</span>
              <input type="text" name="city" placeholder="Example" required />
            </label>
          </div>
          <div class="form-row">
            <label class="input-field boxed plain">
              <span>CEP</span>
              <input type="text" name="zip" placeholder="Example" required />
            </label>
            <label class="input-field boxed plain">
              <span>Celular</span>
              <input type="tel" name="phone" placeholder="Example" required />
            </label>
          </div>
        </form>

        <p class="guarantee">Compra garantida pelo mercado pago!!</p>

        <div class="checkout-actions">
          <button class="yellow-button finish-button" type="submit" form="checkoutForm">Finalizar compra</button>
          <img class="handshake" src="assets/figma/handshake.svg" alt="" aria-hidden="true" />
        </div>
        <p class="checkout-message" id="checkoutMessage" role="status"></p>
      </section>
    </main>

    <script src="shared.js" defer></script>
    <script src="checkout.js" defer></script>
  </body>
</html>
