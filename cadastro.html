<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Criar conta na HRB Imports para receber ofertas exclusivas e comprar pecas premium."
    />
    <title>Criar Conta | HRB Imports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="signup-page">
    <main class="signup-main">
      <section class="signup-card" aria-labelledby="signupTitle">
        <a class="signup-logo" href="index.html" aria-label="Voltar para HRB Imports">
          <img src="assets/signup-logo.svg" alt="HRB Imports Auto Parts" />
        </a>

        <header class="signup-heading">
          <h1 id="signupTitle">Criar Conta</h1>
          <p>Cadastre-se e aproveite ofertas exclusivas</p>
        </header>

        <form class="signup-form" id="signupForm">
          <label class="wide">
            <span>Nome Completo</span>
            <input type="text" name="fullName" placeholder="Ex: Henrique de Paula" autocomplete="name" required />
          </label>

          <label class="wide">
            <span>E-mail</span>
            <input type="email" name="email" placeholder="Ex: example@exemplo.com" autocomplete="email" required />
          </label>

          <label>
            <span>Telefone / WhatsApp</span>
            <input type="tel" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" required />
          </label>

          <label>
            <span>CPF / CNPJ</span>
            <input type="text" name="document" placeholder="000.000.000-00" required />
          </label>

          <label>
            <span>Senha</span>
            <input type="password" name="password" placeholder="*********" autocomplete="new-password" required />
          </label>

          <label>
            <span>Confirmar Senha</span>
            <input type="password" name="confirmPassword" placeholder="*********" autocomplete="new-password" required />
          </label>

          <label class="terms-row">
            <input type="checkbox" name="terms" required />
            <span>Aceito os <a href="#">Termos de Uso</a> e <a href="#">Politica de Privacidade</a></span>
          </label>

          <button class="signup-submit" type="submit">Cadastrar</button>
        </form>

        <a class="signup-login" href="cadastro.html">
          Ja tem uma conta? Faca Login
          <img src="assets/signup-arrow.svg" alt="" aria-hidden="true" />
        </a>

        <div class="signup-trust" aria-label="Beneficios do cadastro">
          <span>Dados protegidos <img src="assets/signup-lock.svg" alt="" /></span>
          <span>Para oficinas e compradores <img src="assets/signup-car.svg" alt="" /></span>
          <span><img src="assets/signup-check.svg" alt="" /> Cadastro gratuito</span>
        </div>

        <p class="signup-message" id="signupMessage" role="status"></p>
      </section>
    </main>

    <script src="cadastro.js" defer></script>
  </body>
</html>
