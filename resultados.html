<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resultados de busca de peças - HRB Imports Auto Parts." />
    <title>Resultados — HRB Imports Auto Parts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-manager">
      <a class="brand" href="index.html" aria-label="HRB Imports">
        <img src="assets/figma/header-logo.svg" alt="HRB Imports" />
      </a>
      <div class="top-actions">
        <button class="top-action" type="button" id="cartButton">
          <span>Meu Carrinho&nbsp;|&nbsp;<strong id="cartTotal">R$ 0,00</strong></span>
          <img src="assets/figma/header-cart-icon.svg" alt="" aria-hidden="true" />
        </button>
        <button class="top-action" type="button" id="loginButton">
          <span>Minha Conta</span>
          <img src="assets/figma/header-user-icon.svg" alt="" aria-hidden="true" />
        </button>
      </div>
    </header>

    <main class="results-layout">
      <aside class="filter-sidebar">
        <form id="resultsFilterForm">
          <label class="input-field boxed">
            <span>Busca</span>
            <input type="search" name="q" placeholder="Trocador de Calor" />
          </label>

          <div class="filter-panel">
            <h2 class="filter-heading">Filtros</h2>

            <div class="filter-group">
              <label class="input-field boxed">
                <span>Montadora</span>
                <select name="brand">
                  <option value="">Marca</option>
                  <option>BMW</option>
                  <option>Mercedes-Benz</option>
                  <option>Audi</option>
                  <option>Volkswagen</option>
                </select>
              </label>
              <img class="brand-logo" id="brandLogo" src="assets/figma/brand-bmw.svg" alt="Logo da montadora" />
              <label class="input-field boxed">
                <span>Modelo</span>
                <select name="model">
                  <option value="">Selecione Modelo</option>
                  <option>320i</option>
                  <option>X1</option>
                  <option>C180</option>
                  <option>A3</option>
                  <option>Jetta</option>
                </select>
              </label>
              <label class="input-field boxed">
                <span>Ano</span>
                <select name="year">
                  <option value="">Selecione Ano</option>
                  <option>2024</option>
                  <option>2023</option>
                  <option>2022</option>
                  <option>2021</option>
                  <option>2020</option>
                </select>
              </label>
              <label class="input-field boxed">
                <span>Motor</span>
                <select name="engine">
                  <option value="">Selecione Motor</option>
                  <option>1.6</option>
                  <option>2.0 Turbo</option>
                  <option>3.0</option>
                </select>
              </label>
            </div>

            <fieldset class="check-group">
              <legend>Categorias</legend>
              <label class="check-item"><input type="checkbox" name="category" value="Pastilhas de Freio" /><span>Sistema de freio</span></label>
              <label class="check-item"><input type="checkbox" name="category" value="Suspensão" /><span>Suspensão dianteira</span></label>
              <label class="check-item"><input type="checkbox" name="category" value="Amortecedores" /><span>Suspensão traseira</span></label>
              <label class="check-item"><input type="checkbox" name="category" value="Velas de Ignição" /><span>Motor</span></label>
            </fieldset>

            <fieldset class="check-group">
              <legend>Marcas</legend>
              <label class="check-item"><input type="checkbox" name="maker" value="HRB" /><span>HRB</span></label>
              <label class="check-item"><input type="checkbox" name="maker" value="Bosch" /><span>Bosch</span></label>
              <label class="check-item"><input type="checkbox" name="maker" value="Febi" /><span>Febi</span></label>
              <label class="check-item"><input type="checkbox" name="maker" value="Hengst" /><span>Hengst</span></label>
            </fieldset>

            <div class="price-range">
              <span class="range-label">Alcance de Preço</span>
              <div class="range-inputs">
                <input type="number" name="minPrice" placeholder="0000" min="0" aria-label="Preço mínimo" />
                <i></i>
                <input type="number" name="maxPrice" placeholder="0000" min="0" aria-label="Preço máximo" />
              </div>
            </div>

            <button class="yellow-button apply-button" type="submit">Aplicar</button>
            <button class="clear-button" type="button" id="clearResultsFilters">Limpar tudo</button>
          </div>
        </form>
      </aside>

      <section class="results-content">
        <div class="section-title reveal">
          <div class="title-row">
            <img src="assets/figma/title-triangle-yellow.svg" alt="" aria-hidden="true" />
            <h1>Resultados</h1>
          </div>
          <img class="title-line" src="assets/figma/title-line-yellow.svg" alt="" aria-hidden="true" />
        </div>
        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <script src="shared.js" defer></script>
    <script src="resultados.js" defer></script>
  </body>
</html>
